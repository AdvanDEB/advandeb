# AdvanDEB Prometheus configuration

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'advandeb'

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mcp_gateway'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
